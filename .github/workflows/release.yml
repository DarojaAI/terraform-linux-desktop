name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    uses: DarojaAI/infra-actions/.github/workflows/reusable-semantic-release.yml@main
    with:
      skip-dirty-check: true
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
