name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6

      - name: Terraform Init
        working-directory: hetzner
        init: |

      - name: Terraform Validate
        working-directory: hetzner
        validate: |